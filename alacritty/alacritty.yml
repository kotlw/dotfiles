# Reference: https://github.com/alacritty/alacritty/blob/master/alacritty.yml
env:
  TERM: xterm-256color

font:
  normal:
    family: FuraMono Nerd Font
    style: Regular
  bold:
    family: FuraMono Nerd Font
    style: Bold
  size: 16.0
  AppleFontSmooting: true

window:
  opacity: 0.9
  padding:
    x: 0
    y: 0
  decorations: buttonless

shell:
  program: /opt/homebrew/bin/tmux
  args:
    - new-session
    - -A
    - -D
    - -s
    - main

colors:
  primary:
    background: '0x212121'
    foreground: '0xabb2bf'

  normal:
    black:   '0x1e2127'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0x828791'

live_config_reload: true
